<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edelweiss Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      height: 100vh;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: white;
      --progress-bar-height: 0px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <model-viewer
      src="https://raw.githubusercontent.com/sebastiankaps/edelweiss/main/sample_2026-03-22T162746.607.glb"
      alt="3D Edelweiss"
      camera-controls
      disable-pan
      interaction-prompt="none"
      auto-rotate
      rotation-per-second="6deg"
      camera-orbit="0deg 90deg 220%"
      min-camera-orbit="auto auto 180%"
      max-camera-orbit="auto auto 260%"
      field-of-view="20deg"
      shadow-intensity="0"
      exposure="1">
    </model-viewer>
  </div>
</body>
</html>
